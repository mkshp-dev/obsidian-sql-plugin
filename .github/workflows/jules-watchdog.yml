# JulesOps kit version: v0.3.0
name: Jules Watchdog

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  GH_TOKEN: ${{ github.token }}
  JULESOPS_CONFIG_PATH: .github/julesops.yml

jobs:
  watchdog:
    name: Check stale Jules issues
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve JulesOps configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/resolve-config.py

      - name: Stop if JulesOps is disabled
        if: steps.config.outputs.enabled != 'true'
        run: echo "JulesOps disabled for this repository."

      - name: Detect and resolve mismatched in-progress issues with open PRs
        if: steps.config.outputs.enabled == 'true'
        shell: bash
        env:
          QUEUE_LABEL: ${{ steps.config.outputs.queue_label }}
          STATUS_IN_PROGRESS: ${{ steps.config.outputs.status_in_progress }}
          STATUS_REVIEW: ${{ steps.config.outputs.status_review }}
        run: |
          set -euo pipefail

          # Fetch all open pull requests and Jules in-progress issues
          gh pr list --repo "${{ github.repository }}" --state open --json number,body > /tmp/open_prs.json
          gh issue list --repo "${{ github.repository }}" --state open --label "$QUEUE_LABEL" --label "$STATUS_IN_PROGRESS" --json number > /tmp/in_progress_issues.json

          python3 - <<'PY'
          import json, os, re, subprocess

          with open('/tmp/open_prs.json', 'r', encoding='utf-8') as f:
              prs = json.load(f)

          with open('/tmp/in_progress_issues.json', 'r', encoding='utf-8') as f:
              issues = json.load(f)

          in_progress_numbers = {issue['number'] for issue in issues}
          if not in_progress_numbers:
              print("No in-progress issues found.")
              exit(0)

          # Regex to find closes/fixes references linking PR to issue
          ref_re = re.compile(r'\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?) #([0-9]+)', re.IGNORECASE)

          repo = os.environ['GITHUB_REPOSITORY']
          status_in_progress = os.environ['STATUS_IN_PROGRESS']
          status_review = os.environ['STATUS_REVIEW']

          for pr in prs:
              body = pr.get('body') or ""
              matches = ref_re.findall(body)
              for match in matches:
                  issue_num = int(match)
                  if issue_num in in_progress_numbers:
                      print(f"Mismatch detected: Issue #{issue_num} is in-progress, but PR #{pr['number']} is open.")
                      
                      # Move issue to review state
                      subprocess.run([
                          'gh', 'issue', 'edit', str(issue_num),
                          '--repo', repo,
                          '--remove-label', status_in_progress,
                          '--add-label', status_review
                      ], check=True)

                      # Post a comment explaining the correction
                      comment_body = (
                          f"## JulesOps Watchdog\n\n"
                          f"Watchdog detected that a linked pull request (#{pr['number']}) is already open, "
                          f"but this issue was in **in-progress**. Automatically transitioning status to \`{status_review}\`."
                      )
                      subprocess.run([
                          'gh', 'issue', 'comment', str(issue_num),
                          '--repo', repo,
                          '--body', comment_body
                      ], check=True)

                      in_progress_numbers.remove(issue_num)
          PY

      - name: Comment on stale in-progress issues
        if: steps.config.outputs.enabled == 'true'
        shell: bash
        env:
          QUEUE_LABEL: ${{ steps.config.outputs.queue_label }}
          STATUS_IN_PROGRESS: ${{ steps.config.outputs.status_in_progress }}
          STALE_IN_PROGRESS_HOURS: ${{ steps.config.outputs.stale_in_progress_hours }}
          WATCHDOG_COOLDOWN_HOURS: "24"
        run: |
          set -euo pipefail
          gh issue list --repo "${{ github.repository }}" --state open --label "$QUEUE_LABEL" --label "$STATUS_IN_PROGRESS" --json number,updatedAt > /tmp/in_progress_issues.json
          python3 - <<'PY'
          import json, os, subprocess
          from datetime import datetime, timezone

          WATCHDOG_MARKER = "## JulesOps Watchdog"

          def load_json(cmd):
              out = subprocess.check_output(cmd, text=True)
              return json.loads(out)

          def recent_watchdog_comment_exists(issue_number: int, cooldown_hours: float) -> bool:
              comments = load_json([
                  "gh", "api",
                  f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{issue_number}/comments"
              ])
              now = datetime.now(timezone.utc)
              for comment in comments:
                  body = comment.get("body", "")
                  if WATCHDOG_MARKER not in body:
                      continue
                  created = comment.get("created_at")
                  if not created:
                      continue
                  created_dt = datetime.fromisoformat(created.replace("Z", "+00:00"))
                  age_hours = (now - created_dt).total_seconds() / 3600.0
                  if age_hours < cooldown_hours:
                      return True
              return False

          with open('/tmp/in_progress_issues.json', 'r', encoding='utf-8') as f:
              issues = json.load(f)

          now = datetime.now(timezone.utc)
          threshold = float(os.environ['STALE_IN_PROGRESS_HOURS'])
          cooldown = float(os.environ['WATCHDOG_COOLDOWN_HOURS'])

          for issue in issues:
              updated = datetime.fromisoformat(issue['updatedAt'].replace('Z', '+00:00'))
              age_hours = (now - updated).total_seconds() / 3600.0
              if age_hours < threshold:
                  continue

              if recent_watchdog_comment_exists(issue['number'], cooldown):
                  continue

              body = (
                  f"## JulesOps Watchdog\n\n"
                  f"This issue has been in **in-progress** for approximately **{age_hours:.1f} hours** "
                  f"without recent GitHub activity. Please review whether it needs follow-up."
              )
              subprocess.run([
                  'gh', 'issue', 'comment', str(issue['number']),
                  '--repo', os.environ['GITHUB_REPOSITORY'],
                  '--body', body
              ], check=True)
          PY

      - name: Comment on stale review issues
        if: steps.config.outputs.enabled == 'true'
        shell: bash
        env:
          QUEUE_LABEL: ${{ steps.config.outputs.queue_label }}
          STATUS_REVIEW: ${{ steps.config.outputs.status_review }}
          STALE_REVIEW_HOURS: ${{ steps.config.outputs.stale_review_hours }}
          WATCHDOG_COOLDOWN_HOURS: "24"
        run: |
          set -euo pipefail
          gh issue list --repo "${{ github.repository }}" --state open --label "$QUEUE_LABEL" --label "$STATUS_REVIEW" --json number,updatedAt > /tmp/review_issues.json
          python3 - <<'PY'
          import json, os, subprocess
          from datetime import datetime, timezone

          WATCHDOG_MARKER = "## JulesOps Watchdog"

          def load_json(cmd):
              out = subprocess.check_output(cmd, text=True)
              return json.loads(out)

          def recent_watchdog_comment_exists(issue_number: int, cooldown_hours: float) -> bool:
              comments = load_json([
                  "gh", "api",
                  f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{issue_number}/comments"
              ])
              now = datetime.now(timezone.utc)
              for comment in comments:
                  body = comment.get("body", "")
                  if WATCHDOG_MARKER not in body:
                      continue
                  created = comment.get("created_at")
                  if not created:
                      continue
                  created_dt = datetime.fromisoformat(created.replace("Z", "+00:00"))
                  age_hours = (now - created_dt).total_seconds() / 3600.0
                  if age_hours < cooldown_hours:
                      return True
              return False

          with open('/tmp/review_issues.json', 'r', encoding='utf-8') as f:
              issues = json.load(f)

          now = datetime.now(timezone.utc)
          threshold = float(os.environ['STALE_REVIEW_HOURS'])
          cooldown = float(os.environ['WATCHDOG_COOLDOWN_HOURS'])

          for issue in issues:
              updated = datetime.fromisoformat(issue['updatedAt'].replace('Z', '+00:00'))
              age_hours = (now - updated).total_seconds() / 3600.0
              if age_hours < threshold:
                  continue

              if recent_watchdog_comment_exists(issue['number'], cooldown):
                  continue

              body = (
                  f"## JulesOps Watchdog\n\n"
                  f"This issue has been in **review** for approximately **{age_hours:.1f} hours** "
                  f"without recent GitHub activity. Please review the linked PR and decide whether to merge or close it."
              )
              subprocess.run([
                  'gh', 'issue', 'comment', str(issue['number']),
                  '--repo', os.environ['GITHUB_REPOSITORY'],
                  '--body', body
              ], check=True)
          PY
