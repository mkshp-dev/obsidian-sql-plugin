# JulesOps kit version: v0.3.0
name: Jules State Sync

on:
  pull_request:
    types:
      - opened
      - reopened
      - closed
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: write

env:
  GH_TOKEN: ${{ github.token }}
  JULESOPS_CONFIG_PATH: .github/julesops.yml

jobs:
  sync_from_pr:
    name: Sync Jules issue state from PR events
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve JulesOps configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/resolve-config.py

      - name: Extract linked issue number from PR body
        id: linked_issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          issue_number="$(printf '%s\n' "$PR_BODY" | grep -Eio '\b(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | head -n1 | grep -Eo '#[0-9]+' | tr -d '#' || true)"

          if [ -z "${issue_number:-}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: Check that linked issue is a Jules issue
        id: issue_meta
        if: steps.linked_issue.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          QUEUE_LABEL="${{ steps.config.outputs.queue_label }}"

          gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json number,state,labels > issue.json
          is_jules="$(jq -r --arg queue_label "$QUEUE_LABEL" 'any(.labels[]; .name == $queue_label)' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"

      - name: Validate linked issue requirement
        id: validate_linked_issue
        if: >
          github.event.action == 'opened' || github.event.action == 'reopened'
        shell: bash
        env:
          REQUIRE_LINK: ${{ steps.config.outputs.require_issue_link }}
          LINK_FOUND: ${{ steps.linked_issue.outputs.found }}
          IS_JULES: ${{ steps.issue_meta.outputs.is_jules }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "$REQUIRE_LINK" = "true" ]; then
            if [ "$LINK_FOUND" != "true" ] || [ "$IS_JULES" != "true" ]; then
              echo "Validation failed: PR #$PR_NUMBER must reference a valid Jules issue."
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "⚠️ **JulesOps Validation Warning**: This pull request must link to a tracked Jules task issue (e.g. \`Closes #123\` or \`Fixes #123\`). Please update the pull request description with a valid issue link."
              echo "is_link_valid=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Linked issue validation passed."
          echo "is_link_valid=true" >> "$GITHUB_OUTPUT"

      - name: Validate PR target base branch
        id: validate_target_branch
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened') &&
          steps.validate_linked_issue.outputs.is_link_valid == 'true'
        shell: bash
        env:
          PR_TARGET: ${{ github.event.pull_request.base.ref }}
          EXPECTED_TARGET: ${{ steps.config.outputs.base_branch }}
          TARGET_BRANCH_ONLY: ${{ steps.config.outputs.target_base_branch_only }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ steps.linked_issue.outputs.issue_number }}
        run: |
          set -euo pipefail

          if [ "$TARGET_BRANCH_ONLY" = "true" ] && [ "$PR_TARGET" != "$EXPECTED_TARGET" ]; then
            echo "Validation failed: PR target branch '$PR_TARGET' does not match configured base branch '$EXPECTED_TARGET'."
            echo "is_valid=false" >> "$GITHUB_OUTPUT"

            # Comment on the PR
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
              --body "⚠️ **JulesOps Validation Warning**: This pull request targets branch \`$PR_TARGET\`, but the repository's configured base branch is \`$EXPECTED_TARGET\`. Please retarget this PR to \`$EXPECTED_TARGET\` to proceed."

            # Comment on the issue
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "⚠️ **JulesOps Validation Warning**: Linked PR #$PR_NUMBER targets \`$PR_TARGET\`, which differs from the configured base branch \`$EXPECTED_TARGET\`. Moving this issue to blocked status."
          else
            echo "PR target branch is valid."
            echo "is_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Move issue to review when PR opens
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened') &&
          steps.validate_linked_issue.outputs.is_link_valid == 'true' &&
          steps.validate_target_branch.outputs.is_valid == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_BLOCKED" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_REVIEW" || true

      - name: Move issue to blocked when PR target branch validation fails
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened') &&
          steps.validate_linked_issue.outputs.is_link_valid == 'true' &&
          steps.validate_target_branch.outputs.is_valid == 'false'
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_REVIEW" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_BLOCKED" || true

      - name: Mark issue done and close it when PR is merged
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"
          STATUS_DONE="${{ steps.config.outputs.status_done }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_REVIEW" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_BLOCKED" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_DONE" || true
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "The linked Jules PR was merged. Transitioning status to \`$STATUS_DONE\`."

          if [ "${{ steps.config.outputs.close_on_merge }}" = "true" ]; then
            gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}" --comment "Closing automatically because the linked Jules PR was merged."
          fi

      - name: Mark issue blocked if PR is closed without merge
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged != true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_REVIEW" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_BLOCKED" || true
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "The linked Jules PR was closed without merge. Marking this issue as \`$STATUS_BLOCKED\` for maintainer review."

  sync_from_issue_comment:
    name: Sync Jules issue state from blocked comment
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve JulesOps configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/resolve-config.py

      - name: Check whether this is a Jules issue
        id: issue_meta
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          QUEUE_LABEL="${{ steps.config.outputs.queue_label }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"

          gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json number,state,labels > issue.json
          is_jules="$(jq -r --arg queue_label "$QUEUE_LABEL" 'any(.labels[]; .name == $queue_label)' issue.json)"
          has_in_progress="$(jq -r --arg in_progress "$STATUS_IN_PROGRESS" 'any(.labels[]; .name == $in_progress)' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"
          echo "has_in_progress=$has_in_progress" >> "$GITHUB_OUTPUT"

      - name: Move issue to blocked if comment looks like Jules blocked output
        if: >
          steps.issue_meta.outputs.is_jules == 'true' &&
          steps.issue_meta.outputs.has_in_progress == 'true' &&
          contains(github.event.comment.body, steps.config.outputs.blocked_marker)
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_BLOCKED" || true
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "Jules reported a blocked state. Marking this issue as \`$STATUS_BLOCKED\` for maintainer review."

      - name: Process retry or requeue command from maintainer
        if: >
          steps.issue_meta.outputs.is_jules == 'true' &&
          (
            contains(github.event.comment.body, '/jules') ||
            contains(github.event.comment.body, '/Jules')
          )
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          # Treat the comment body as data. The parser rejects punctuation or extra text.
          COMMAND="$(printf '%s' "$COMMENT_BODY" | node scripts/comment-command.js || true)"

          if [[ -z "$COMMAND" ]]; then
            echo "Not a recognized retry command. Skipping."
            exit 0
          fi
          # Verify commenter is a maintainer (has OWNER, MEMBER, or COLLABORATOR role)
          if [[ "$AUTHOR_ASSOC" != "OWNER" && "$AUTHOR_ASSOC" != "MEMBER" && "$AUTHOR_ASSOC" != "COLLABORATOR" ]]; then
            echo "Unauthorized user @$COMMENTER attempted to retry issue."
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "Permission denied: Only repository maintainers can requeue/retry issues."
            exit 0
          fi

          STATUS_TODO="${{ steps.config.outputs.status_todo }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"
          STATUS_FAILED="${{ steps.config.outputs.status_failed }}"
          STATUS_DONE="${{ steps.config.outputs.status_done }}"

          echo "Requeueing issue #$ISSUE_NUMBER..."

          # Remove existing status labels and add todo label
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "$STATUS_IN_PROGRESS" \
            --remove-label "$STATUS_REVIEW" \
            --remove-label "$STATUS_BLOCKED" \
            --remove-label "$STATUS_FAILED" \
            --remove-label "$STATUS_DONE" || true

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_TODO"

          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --body "Issue requeued by @$COMMENTER. Triggering Jules Dispatch..."

          # Trigger the dispatch workflow
          gh workflow run jules-dispatch.yml --repo "${{ github.repository }}"
